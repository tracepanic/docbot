{{define "layout"}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{template "title" .}}</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        padding: 2rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: #fff;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
      }
      th {
        text-align: left;
        padding: 0.5rem 0.75rem;
        border-bottom: 2px solid #333;
        color: #888;
        font-weight: 500;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      td {
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid #2a2a3e;
      }
      tr:hover {
        background: #2a2a3e;
      }
      a {
        color: #7c8aff;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .status-active {
        color: #57f287;
      }
      .status-inactive {
        color: #ed4245;
      }
    </style>
  </head>
  <body>
    {{template "content" .}}
  </body>
</html>
{{end}}
